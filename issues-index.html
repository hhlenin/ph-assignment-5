<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker Application</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body class="bg-[#F8FAFC] geist">
    <nav class="flex justify-between items-center px-20 py-4 bg-white">
        <div class="flex items-center gap-1.5">
            <img src="./assets/github-logo.png" height="36" width="36" alt="">
            <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
        </div>
        <div class="flex gap-4">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" onkeyup="getSearchResult(this.value)" class="grow" placeholder="Search issues..." />

            </label>
            <label class="input w-auto bg-primary text-white">
                <input type="button"><i class="fa-solid fa-plus"></i>New Issue
            </label>
        </div>
    </nav>
    <hr class="text-[#E6E7E9]">


    <section class="jobs-section container mt-16 bg-white">
        <div id="parent" class="card shadow-lg jobs p-6 mb-4">
            <div class="tab-group sm:grid-cols-2 md:grid-cols-3 gap-2.5">
                <button id="all" class="btn capitalize w-24 btn-primary">all</button>
                <button id="open" class="btn capitalize w-24 text-base-content/60">open</button>
                <button id="closed" class="btn capitalize w-24 text-base-content/60">closed</button>
            </div>


        </div>


    </section>

    <section class="jobs-section container mt-4 bg-white rounded-xl">
        <div class="flex items-center justify-between p-6">
            <div class="flex gap-2.5">
                <div class="flex justify-center items-center w-12 h-12 bg-[#ECE4FF] rounded-4xl">
                    <img class="w-7" src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h3 class="font-semibold text-xl">
                        <span id="all-issue-count" class=""></span>
                        <span id="open-issue-count" class="hidden"></span> 
                        <span id="closed-issue-count" class="hidden"></span> 

                        Issues</h3>
                    <p class="text-base-content/40">Track and manage your project issues</p>
                </div>
            </div>


            <div class="flex gap-4">
                <div class="flex items-center gap-2">
                    <div class="h-3 w-3 bg-success rounded-full"></div>
                    <p class="capitalize font-medium">open</p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="h-3 w-3 bg-primary rounded-full"></div>
                    <p class="capitalize font-medium">closed</p>
                </div>
            </div>
        </div>
        <hr class="text-base-content/10">
        <div id="spinner" class="">
            <div class="w-full h-36 flex justify-center">
                <span class="loading loading-dots loading-xl"></span>
            </div>
        </div>
        <div id="accordion-all" class="job-cards grid grid-cols-4 p-6 gap-3 bg-[#FBFBFB]">
            
        </div>
        <div id="accordion-open" class="job-cards hidden grid grid-cols-4 p-6 gap-3 bg-[#FBFBFB]">

        </div>
        <div id="accordion-closed" class="job-cards hidden grid grid-cols-4 p-6 gap-3 bg-[#FBFBFB]">

        </div>
        <div id="accordion-search" class="job-cards hidden grid grid-cols-4 p-6 gap-3 bg-[#FBFBFB]">

        </div>

    </section>
<dialog id="details_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="modal-content" class="">
        <div id="spinner" class="">
            <div class="w-full h-36 flex justify-center">
                <span class="loading loading-dots loading-xl"></span>
            </div>
        </div>
        
    </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>

    <script src="./scripts/script.js"></script>
    <script src="./scripts/helper.js"></script>

    <script>
        setTabData("https://phi-lab-server.vercel.app/api/v1/lab/issues");
    </script>

</body>

</html>
