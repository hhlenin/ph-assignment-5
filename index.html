<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker Application</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./styles/login.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
</head>
<body class="geist py-[76px]">
    <div class="card shadow-2xl m-auto container w-[520px]">
        <div class="p-8 space-y-6">
        <div class="flex flex-col items-center">
            <div>
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            <p class="text-base-content/40">Sign in to manage your issues</p>
        </div>

        <div id="inputs">
            <fieldset class="fieldset">
                <legend class="fieldset-legend text-[16px]">User Name</legend>
                <input type="text" id="user-name" class="input w-full" placeholder="Enter User Name" />
                <p class="label text-sm text-primary">Default: admin</p>
            </fieldset>

            <fieldset class="fieldset">
                <legend class="fieldset-legend text-[16px]">Password</legend>
                <input type="text" id="password" class="input w-full" placeholder="Enter Password" />
                <p class="label text-sm text-primary">Default: admin123</p>
            </fieldset>


        </div>

        <button id="sign-in" class="btn btn-primary w-full" type="button">Sign In</button>
        <p id="wrong-credential" class="text-error hidden">Wrong Credentials</p>

        <div class="divider">OR</div>

        <div class="text-center">
                <p class="text-sm text-base-content/40 pb-8">Demo Credentials:</p>

                <p><span class="font-semibold">Username:</span> admin <br><span class="font-semibold">Password:</span> admin123</p>
        </div>
        </div>
        </div>

    </div>

    <script src="./scripts/login.js"></script>
</body>
</html>
